name: MIRA Daily Run — Content & Brand

on:
  schedule:
    # 07:00 UTC = 10:00 Israel (UTC+3)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  trigger-mira-daily:
    name: Trigger MIRA daily content run
    runs-on: ubuntu-latest
    steps:
      - name: POST /mcp/call — MIRA create_run
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://mcp.clarvix.net/mcp/call" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CLARVIX_API_KEY }}" \
            -d '{
              "tool": "create_run",
              "input": {
                "agent_name": "MIRA",
                "task_type": "daily_run",
                "input_data": {
                  "triggered_by": "github_actions",
                  "workflow": "mira_daily",
                  "schedule": "0 7 * * *"
                }
              }
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "ERROR: SaaS returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ MIRA daily run triggered successfully"
