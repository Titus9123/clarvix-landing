name: MIRA Daily Run — Content & Brand

on:
  schedule:
    # 07:00 UTC = 10:00 Israel (UTC+3)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  trigger-mira-daily:
    name: Trigger MIRA daily content run
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/runs — MIRA daily_run
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://mcp.clarvix.net/api/runs" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CLARVIX_API_KEY }}" \
            -d '{
              "agent_name": "MIRA",
              "task_type": "daily_run",
              "service_type": "content",
              "input_payload": {
                "triggered_by": "github_actions",
                "workflow": "mira_daily",
                "schedule": "0 7 * * *"
              }
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "ERROR: SaaS returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ MIRA daily run triggered successfully"
