name: MIRA — Daily Content (09:00 Israel)

on:
  schedule:
    - cron: '0 7 * * 0-4'   # 09:00 Israel (UTC+2), Dom-Jue
    - cron: '0 7 * * 5'     # Viernes — contenido pre-Shabbat
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo'
        required: false
        default: 'DAILY'
        type: choice
        options: [DAILY, ADS_MANAGER, OPTIMIZE, CAMPAIGN]
      note:
        description: 'Nota adicional para MIRA'
        required: false
        default: ''

jobs:
  mira-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Run MIRA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MCP_URL:           ${{ secrets.MCP_URL }}
          MCP_API_KEY:       ${{ secrets.CLARVIX_API_KEY }}
          MIRA_MODE:         ${{ github.event.inputs.mode || 'DAILY' }}
          MIRA_NOTE:         ${{ github.event.inputs.note || '' }}
        run: python scripts/trigger_mira.py
