name: BEN Morning Run — Client Success (Dom-Jue)

on:
  schedule:
    # 05:00 UTC = 08:00 Israel — domingo(0) a jueves(4)
    # Israel trabaja Dom-Jue, descansa Vie-Sab
    - cron: '0 5 * * 0-4'
  workflow_dispatch:

jobs:
  trigger-ben:
    name: Trigger BEN morning client check
    runs-on: ubuntu-latest
    steps:
      - name: POST /mcp/call — BEN create_run
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://mcp.clarvix.net/mcp/call" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CLARVIX_API_KEY }}" \
            -d '{
              "tool": "create_run",
              "input": {
                "agent_name": "BEN",
                "task_type": "morning_run",
                "input_data": {
                  "triggered_by": "github_actions",
                  "workflow": "ben_morning",
                  "schedule": "0 5 * * 0-4",
                  "check_type": "client_health_review"
                }
              }
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "ERROR: SaaS returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ BEN morning run triggered successfully"
