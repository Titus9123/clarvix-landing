name: MIRA — Weekly Optimize (Sábados)

on:
  schedule:
    - cron: '0 8 * * 6'   # Sábados 10:00 Israel
  workflow_dispatch:

jobs:
  mira-optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests
      - name: Run MIRA OPTIMIZE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MCP_URL:           ${{ secrets.MCP_URL }}
          MCP_API_KEY:       ${{ secrets.CLARVIX_API_KEY }}
          MIRA_MODE:         OPTIMIZE
        run: python scripts/trigger_mira.py
