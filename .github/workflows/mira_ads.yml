name: MIRA Ads Run — Martes y Viernes

on:
  schedule:
    # 09:00 UTC = 12:00 Israel — martes (2) y viernes (5)
    - cron: '0 9 * * 2,5'
  workflow_dispatch:

jobs:
  trigger-mira-ads:
    name: Trigger MIRA ads performance run
    runs-on: ubuntu-latest
    steps:
      - name: POST /mcp/call — MIRA ads create_run
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://mcp.clarvix.net/mcp/call" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.CLARVIX_API_KEY }}" \
            -d '{
              "tool": "create_run",
              "input": {
                "agent_name": "MIRA",
                "task_type": "ads_review",
                "input_data": {
                  "triggered_by": "github_actions",
                  "workflow": "mira_ads",
                  "schedule": "0 9 * * 2,5",
                  "platforms": ["facebook", "instagram", "google"]
                }
              }
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "ERROR: SaaS returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ MIRA ads review triggered successfully"
